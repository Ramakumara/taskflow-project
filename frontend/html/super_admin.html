<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Super Admin</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230c974a'/%3E%3Cpath d='M18 34h12v12H18zm16-16h12v28H34z' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/css/super_admin.css?v=20260608-green-aligned">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <div class="super-shell">
        <aside class="super-sidebar">
            <div class="super-brand brand-mark" aria-hidden="true">
                <span class="brand-piece brand-piece-wide"></span>
                <span class="brand-piece brand-piece-mid"></span>
                <span class="brand-piece brand-piece-thin"></span>
            </div>

            <nav class="super-nav" aria-label="Super Admin navigation">
                <button class="super-nav-item active" data-view="dashboard" onclick="setSuperView('dashboard')"><i class="fas fa-gauge-high"></i><span>Platform Overview</span></button>
                <button class="super-nav-item" data-view="admins" onclick="setSuperView('admins')"><i class="fas fa-user-shield"></i><span>Workspace Admins</span></button>
                <button class="super-nav-item" data-view="users" onclick="setSuperView('users')"><i class="fas fa-users-gear"></i><span>Access Control</span></button>
                <button class="super-nav-item" data-view="projects" onclick="setSuperView('projects')"><i class="fas fa-folder-tree"></i><span>Project Governance</span></button>
                <button class="super-nav-item" data-view="tasks" onclick="setSuperView('tasks')"><i class="fas fa-list-check"></i><span>Work Monitoring</span></button>
                <button class="super-nav-item" data-view="analytics" onclick="setSuperView('analytics')"><i class="fas fa-chart-line"></i><span>Platform Reports</span></button>
                <button class="super-nav-item" data-view="audit" onclick="setSuperView('audit')"><i class="fas fa-clock-rotate-left"></i><span>Security Audit</span></button>
                <button class="super-nav-item" data-view="settings" onclick="setSuperView('settings')"><i class="fas fa-sliders"></i><span>Configuration</span></button>
            </nav>
        </aside>

        <main class="super-main">
            <header class="super-topbar">
                <label class="super-search" for="superSearch">
                    <i class="fas fa-search"></i>
                    <input id="superSearch" type="search" placeholder="Search current view..." oninput="handleSuperSearch(this.value)">
                </label>

                <div class="super-profile">
                    <span class="super-health-dot" id="superHealthDot"></span>
                    <span id="superWelcome">Super Admin</span>
                    <button class="icon-button" type="button" onclick="logoutFromSuperAdmin()" title="Logout" aria-label="Logout">
                        <i class="fas fa-right-from-bracket"></i>
                    </button>
                </div>
            </header>

            <section class="super-content" id="superContent">
                <div class="super-loading">Loading Super Admin console...</div>
            </section>
        </main>
    </div>

    <div id="superModalRoot"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/javascript/api.js?v=20260605-super-admin"></script>
    <script src="/static/javascript/super_admin.js?v=20260608-pagination-footer"></script>
    <script>
        const role = sessionStorage.getItem("role");
        if (role !== "super_admin") {
            alert("Access denied");
            window.location.href = "/";
        }
        initializeSuperAdmin();
    </script>
</body>
</html>
