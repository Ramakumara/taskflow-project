<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Super Admin</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f766e'/%3E%3Cpath d='M16 38h10v10H16zm14-22h10v32H30zm14 12h10v20H44z' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/css/super_admin.css?v=20260605-enterprise">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <div class="super-shell">
        <aside class="super-sidebar">
            <div class="super-brand">
                <span class="super-brand-mark"><i class="fas fa-layer-group"></i></span>
                <div>
                    <strong>TaskFlow</strong>
                    <small>Super Admin</small>
                </div>
            </div>

            <nav class="super-nav" aria-label="Super Admin navigation">
                <button class="super-nav-item active" data-view="dashboard" onclick="setSuperView('dashboard')"><i class="fas fa-gauge-high"></i><span>Dashboard</span></button>
                <button class="super-nav-item" data-view="users" onclick="setSuperView('users')"><i class="fas fa-users-gear"></i><span>User Management</span></button>
                <button class="super-nav-item" data-view="admins" onclick="setSuperView('admins')"><i class="fas fa-user-shield"></i><span>Admin Management</span></button>
                <button class="super-nav-item" data-view="projects" onclick="setSuperView('projects')"><i class="fas fa-folder-tree"></i><span>Global Projects</span></button>
                <button class="super-nav-item" data-view="tasks" onclick="setSuperView('tasks')"><i class="fas fa-list-check"></i><span>Task Monitoring</span></button>
                <button class="super-nav-item" data-view="analytics" onclick="setSuperView('analytics')"><i class="fas fa-chart-line"></i><span>Analytics</span></button>
                <button class="super-nav-item" data-view="audit" onclick="setSuperView('audit')"><i class="fas fa-clock-rotate-left"></i><span>Audit Logs</span></button>
                <button class="super-nav-item" data-view="settings" onclick="setSuperView('settings')"><i class="fas fa-sliders"></i><span>System Settings</span></button>
            </nav>
        </aside>

        <main class="super-main">
            <header class="super-topbar">
                <label class="super-search" for="superSearch">
                    <i class="fas fa-search"></i>
                    <input id="superSearch" type="search" placeholder="Search current view..." oninput="handleSuperSearch(this.value)">
                </label>

                <div class="super-profile">
                    <span class="super-health-dot" id="superHealthDot"></span>
                    <span id="superWelcome">Super Admin</span>
                    <button class="icon-button" type="button" onclick="logoutFromSuperAdmin()" title="Logout" aria-label="Logout">
                        <i class="fas fa-right-from-bracket"></i>
                    </button>
                </div>
            </header>

            <section class="super-content" id="superContent">
                <div class="super-loading">Loading Super Admin console...</div>
            </section>
        </main>
    </div>

    <div id="superModalRoot"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/javascript/api.js?v=20260605-super-admin"></script>
    <script src="/static/javascript/super_admin.js?v=20260605-enterprise"></script>
    <script>
        const role = sessionStorage.getItem("role");
        if (role !== "super_admin") {
            alert("Access denied");
            window.location.href = "/";
        }
        initializeSuperAdmin();
    </script>
</body>
</html>
