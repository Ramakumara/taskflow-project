<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Login | Secure Workspace Access</title>
    <meta name="description" content="Sign in to TaskFlow to manage tasks, collaborate with your team, and track project progress in one secure workspace.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230c974a'/%3E%3Cpath d='M18 34h12v12H18zm16-16h12v28H34z' fill='white'/%3E%3C/svg%3E">

    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/public.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="login-background login-page auth-page">
<div class="public-decor"></div>

<header class="auth-navbar">
    <a class="auth-logo" href="/">
        <span class="auth-logo-mark">T</span>
        <span>TaskFlow</span>
    </a>

    <nav class="auth-nav-links" aria-label="Primary navigation">
        <a href="/about-us">About Us</a>
        <a href="/features">Features</a>
        <a href="/pricing">Pricing</a>
        <a href="/contact">Contact</a>
        <button class="get-started-btn">
            <a href="/register-page" style="color:white; text-decoration:none;">
                Get Started
            </a>
        </button>
    </nav>

    
</header>

<main class="login-container">
    <section class="login-card" aria-label="Login form">
        <div class="login-card-head">
            <span class="login-eyebrow"><i class="fa-solid fa-shield-halved"></i> Welcome back </span>
        </div>

        <label for="email">Email</label>
        <div class="input-group">
            <i class="input-leading-icon fa-regular fa-envelope"></i>
            <input id="email" type="email" placeholder="name@company.com" autocomplete="email">
        </div>

        <div class="password-label-row">
            <label for="password">Password</label>
            <a href="/forgot-page">Forgot password?</a>
        </div>
        <div class="input-group">
            <i class="input-leading-icon fa-solid fa-lock"></i>
            <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
            <button class="eye-icon" type="button" onclick="togglePassword()" aria-label="Show or hide password">
                <i id="eyeIcon" class="bi bi-eye"></i>
            </button>
        </div>

        <div class="g-recaptcha" data-sitekey="6Lc9rccsAAAAACNCfCB58_2MxFeAiR0u5KgTn7Zr"></div>
        <button class="login-submit-btn" onclick="handleLogin()">
            <span>Login</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div class="divider"><span>or continue with</span></div>

        <button type="button" onclick="loginWithGoogle()" class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="">
            <span>Continue with Google</span>
        </button>

        <p class="register-copy">Don't have an account? <a href="/register-page">Register</a></p>
    </section>
</main>

<footer class="auth-footer">
    <span>&copy; 2026 TaskFlow. All rights reserved.</span>
    <a href="/privacy-policy">Privacy Policy</a>
    <a href="/terms-of-service">Terms of Service</a>
    <a href="/help-center">Help Center</a>
</footer>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script src="/static/javascript/api.js"></script>
<script src="/static/javascript/public.js"></script>

<script>
function togglePassword() {
    let input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

function loginWithGoogle() {
    window.location.href = "/login/google";
}
</script>

</body>
</html>
