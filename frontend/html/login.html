<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="login-background login-page">

<header class="auth-navbar">
    <a class="auth-logo" href="/">
        <span class="auth-logo-mark">T</span>
        <span>TaskFlow</span>
    </a>

    <nav class="auth-nav-links" aria-label="Primary navigation">
        <a href="#">About Us</a>
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">Contact</a>
    </nav>

    <button class="auth-language" type="button">
        <i class="fa-solid fa-globe"></i>
        <span>English</span>
        <i class="fa-solid fa-chevron-down"></i>
    </button>
</header>

<main class="login-container">
    <section class="login-card" aria-label="Login form">
        <div class="login-card-head">
            <span class="login-eyebrow"><i class="fa-solid fa-shield-halved"></i> Welcome back </span>
        </div>

        <label for="email">Email</label>
        <div class="input-group">
            <i class="input-leading-icon fa-regular fa-envelope"></i>
            <input id="email" type="email" placeholder="name@company.com" autocomplete="email">
        </div>

        <div class="password-label-row">
            <label for="password">Password</label>
            <a href="/forgot-page">Forgot password?</a>
        </div>
        <div class="input-group">
            <i class="input-leading-icon fa-solid fa-lock"></i>
            <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
            <button class="eye-icon" type="button" onclick="togglePassword()" aria-label="Show or hide password">
                <i id="eyeIcon" class="bi bi-eye"></i>
            </button>
        </div>

        <div class="g-recaptcha" data-sitekey="6Lc9rccsAAAAACNCfCB58_2MxFeAiR0u5KgTn7Zr"></div>
        <button class="login-submit-btn" onclick="handleLogin()">
            <span>Login</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div class="divider"><span>or continue with</span></div>

        <button type="button" onclick="loginWithGoogle()" class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="">
            <span>Continue with Google</span>
        </button>

        <p class="register-copy">Don't have an account? <a href="/register-page">Register</a></p>
    </section>
</main>

<footer class="auth-footer">
    <span>&copy; 2025 TaskFlow. All rights reserved.</span>
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Service</a>
    <a href="#">Help Center</a>
</footer>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script src="/static/javascript/api.js"></script>

<script>
function togglePassword() {
    let input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

function loginWithGoogle() {
    window.location.href = "/login/google";
}
</script>

</body>
</html>
