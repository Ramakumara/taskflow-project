<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="/static/css/profile.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="profile-app">
        <aside class="profile-sidebar">
            <div class="brand-mark" aria-hidden="true">
                <span class="brand-piece brand-piece-wide"></span>
                <span class="brand-piece brand-piece-mid"></span>
                <span class="brand-piece brand-piece-thin"></span>
            </div>

            <nav class="profile-nav">
                <button class="nav-item" type="button" onclick="goBack()">
                    <i class="fas fa-house"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item active" type="button">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </button>
                <button class="nav-item" type="button" onclick="logout()">
                    <i class="fas fa-right-from-bracket"></i>
                    <span>Logout</span>
                </button>
            </nav>
        </aside>

        <main class="profile-main">
            <header class="profile-topbar">
                <label class="search-box" for="profileSearch">
                    <i class="fas fa-search"></i>
                    <input id="profileSearch" type="text" placeholder="Search...">
                </label>

                <div class="topbar-right">
                    <div class="topbar-user">
                        <div id="profile-avatar" class="topbar-avatar">R</div>
                        <div>
                            <p id="profile-name" class="topbar-name">Welcome, User</p>
                            <span id="profile-role-pill" class="topbar-role">User</span>
                        </div>
                    </div>
                </div>
            </header>

            <section class="page-head">
                <h1>My Profile</h1>
            </section>

            <section class="profile-card-shell">
                <article class="profile-left-card">
                    <div class="avatar-wrap">
                        <div id="profile-avatar-large" class="large-avatar">R</div>
                        <button type="button" class="camera-badge" aria-label="Change photo">
                            <i class="fas fa-camera"></i>
                        </button>
                    </div>

                    <h2 id="profile-name-2">Your Name</h2>
                    <p id="profile-role-2" class="role-text">User</p>

                    <div class="mini-info">
                    </div>

                    <button type="button" class="edit-btn">Edit Profile</button>
                </article>

                <article class="profile-right-card">
                    <h2>Profile Details</h2>

                    <div class="detail-row">
                        <span>Full Name</span>
                        <strong id="profile-username-2">-</strong>
                    </div>
                    <div class="detail-row">
                        <span>Role</span>
                        <strong id="profile-role">-</strong>
                    </div>
                    <div class="detail-row">
                        <span>Email</span>
                        <strong id="profile-email-2">-</strong>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script>
        function loadProfile() {
            const email = localStorage.getItem("email") || "";
            const role = localStorage.getItem("role") || "user";
            const username = localStorage.getItem("username") || "User";

            if (!email) {
                alert("No user data found. Please login again.");
                window.location.href = "/";
                return;
            }

            const initial = (username || email).charAt(0).toUpperCase();
            ["profile-avatar", "profile-avatar-large"].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerText = initial;
            });

            const roleText = role.charAt(0).toUpperCase() + role.slice(1);
            const binds = {
                "profile-name": `Welcome, ${username}`,
                "profile-name-2": username,
                "profile-email": email,
                "profile-email-2": email,
                "profile-username-2": username,
                "profile-role": roleText,
                "profile-role-2": roleText,
                "profile-role-pill": roleText
            };

            Object.entries(binds).forEach(([id, value]) => {
                const el = document.getElementById(id);
                if (el) el.innerText = value;
            });
        }

        function goBack() {
            window.location.href = "/dashboard-page";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "/";
        }

        window.addEventListener("DOMContentLoaded", loadProfile);
    </script>
</body>
</html>
