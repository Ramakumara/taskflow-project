<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230c974a'/%3E%3Cpath d='M18 34h12v12H18zm16-16h12v28H34z' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/css/admin.css?v=20260528-file-upload-modal">
    <link rel="stylesheet" href="/static/css/chat.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <div class="dashboard-shell">
        <aside class="sidebar">
            <div class="brand-mark" aria-hidden="true">
                <span class="brand-piece brand-piece-wide"></span>
                <span class="brand-piece brand-piece-mid"></span>
                <span class="brand-piece brand-piece-thin"></span>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-section="dashboard" onclick="goToDashboard()">
                    <i class="fas fa-book"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-section="tasks" onclick="goToTasks()">
                    <i class="far fa-square-check"></i>
                    <span>Tasks</span>
                </button>
                <button class="nav-item" data-section="team" onclick="goToTeam()">
                    <i class="fas fa-users"></i>
                    <span>My Team</span>
                </button>
                <button class="nav-item" data-section="files" onclick="goToFiles()">
                    <i class="fas fa-file"></i>
                    <span>Files</span>
                </button>
                <button class="nav-item" data-section="users" onclick="goToUsers()">
                    <i class="fas fa-user"></i>
                    <span>Users</span>
                </button>
                <button class="nav-item" data-section="reports" onclick="goToReports()">
                    <i class="fas fa-chart-simple"></i>
                    <span>Reports</span>
                </button>
                <button class="nav-item" data-section="activity" onclick="goToActivityLog()">
                    <i class="fas fa-clock-rotate-left"></i>
                    <span>Activity Log</span>
                </button>
                <button class="nav-item" data-section="settings" onclick="goToSettings()">
                    <i class="fas fa-gear"></i>
                    <span>Settings</span>
                </button>
            </nav>
        </aside>

        <main class="main-panel">
            <header class="topbar">
                <label class="search-box" for="adminSearch">
                    <i class="fas fa-search"></i>
                    <input id="adminSearch" type="text" placeholder="Search..." oninput="handleAdminSearch(event)">
                </label>

                <div class="topbar-actions">
                    <div class="notification-wrap" id="adminNotificationWrap">
                        <button class="notification-button" type="button" onclick="toggleAdminNotifications(event)" aria-label="Open notifications" aria-haspopup="true" aria-expanded="false" id="adminNotificationButton">
                            <i class="fas fa-bell notification"></i>
                        </button>
                        <span class="notification-badge" id="notificationCount">0</span>
                        <div class="notification-dropdown hidden" id="adminNotificationDropdown">
                            <div class="notification-dropdown-head">
                                <div>
                                    <h3>Admin Notifications</h3>
                                    <p id="adminNotificationSummary">Monitoring projects, tasks, users, files, and system activity.</p>
                                </div>
                                <div class="notification-dropdown-actions">
                                    <button type="button" onclick="markAllAdminNotificationsRead(event)">Mark all read</button>
                                    <button type="button" onclick="clearOldAdminNotifications(event)">Clear old</button>
                                </div>
                            </div>
                            <div class="notification-filter-row" id="adminNotificationFilters" role="tablist" aria-label="Filter notifications">
                                <button class="notification-filter-chip active" type="button" data-filter="all" onclick="setAdminNotificationFilter('all')">All</button>
                                <button class="notification-filter-chip" type="button" data-filter="unread" onclick="setAdminNotificationFilter('unread')">Unread</button>
                                <button class="notification-filter-chip" type="button" data-filter="projects" onclick="setAdminNotificationFilter('projects')">Projects</button>
                                <button class="notification-filter-chip" type="button" data-filter="tasks" onclick="setAdminNotificationFilter('tasks')">Tasks</button>
                                <button class="notification-filter-chip" type="button" data-filter="users" onclick="setAdminNotificationFilter('users')">Users</button>
                            </div>
                            <div class="notification-list" id="adminNotificationList">
                                <div class="notification-empty">Loading notifications...</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-menu">
                    <button class="profile-wrap" type="button" onclick="toggleAdminProfileMenu(event)" aria-haspopup="true" aria-expanded="false" id="profileMenuButton">
                        <img id="profileAvatar" src="https://i.pravatar.cc/48?img=12" alt="Admin avatar">
                        <span id="welcome-user">Admin</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>

                    <div class="profile-dropdown hidden" id="profileDropdown">
                        <button type="button" class="profile-option" onclick="goToProfile()">
                            <i class="fas fa-user"></i>
                            <span>My Profile</span>
                        </button>
                        
                        <button type="button" class="profile-option" onclick="goToSettings()">
                            <i class="fas fa-gear"></i>
                            <span>Settings</span>
                        </button>
                        <button type="button" class="profile-option logout-option" onclick="logoutFromAdmin()">
                            <i class="fas fa-right-from-bracket"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                    </div>
                </div>
            </header>

            <section class="content-area" id="mainContent"></section>
        </main>
    </div>

    <div id="admin-file-upload-modal" class="admin-file-upload-modal hidden" role="dialog" aria-modal="true" aria-labelledby="adminFileUploadModalTitle">
        <div class="admin-file-upload-card">
            <div class="admin-file-upload-head">
                <div class="admin-file-upload-title-group">
                    <span class="admin-file-upload-head-icon"><i class="fas fa-cloud-arrow-up"></i></span>
                    <div>
                        <h2 id="adminFileUploadModalTitle">Upload &amp; Assign File</h2>
                        <p>Upload a file and assign it to team members.</p>
                    </div>
                </div>
                <button class="admin-file-upload-close" type="button" onclick="closeAdminFileUploadModal()" aria-label="Close upload modal">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>

            <div class="admin-file-upload-body">
                <label id="adminFileDropZone" class="admin-file-drop-zone" for="admin-modal-file-input">
                    <input id="admin-modal-file-input" type="file" class="hidden" onchange="handleAdminModalFileSelection(event)">
                    <span class="admin-file-drop-icon"><i class="fas fa-cloud-arrow-up"></i></span>
                    <strong id="adminFileDropTitle">Drag &amp; drop your file here</strong>
                    <small id="adminFileDropSubtitle">or</small>
                    <span class="admin-file-choose-btn"><i class="fas fa-folder"></i>Choose File</span>
                    <em id="adminSelectedFileName">Max file size: 100 MB</em>
                </label>

                <div class="admin-file-upload-fields">
                    <label class="admin-file-upload-field" for="admin-file-project-select">
                        <span>Select Project</span>
                        <select id="admin-file-project-select" onchange="handleAdminFileProjectChange()"></select>
                    </label>

                    <label class="admin-file-upload-field" for="admin-file-task-select">
                        <span>Select Task</span>
                        <select id="admin-file-task-select" onchange="handleAdminFileTaskChange()"></select>
                    </label>

                    <div class="admin-file-upload-field">
                        <span>Assign To</span>
                        <button id="admin-file-assignee-trigger" class="admin-file-assignee-trigger" type="button" onclick="toggleAdminFileAssigneeMenu(event)">
                            <span id="admin-file-assignee-chips" class="admin-file-assignee-chips">Select team members</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div id="admin-file-assignee-menu" class="admin-file-assignee-menu hidden">
                            <div id="admin-file-assignee-options" class="admin-file-assignee-options"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="admin-file-upload-actions">
                <button class="admin-file-upload-cancel" type="button" onclick="closeAdminFileUploadModal()">Cancel</button>
                <button id="admin-send-file-btn" class="admin-file-upload-submit" type="button" onclick="submitAdminAssignedFile()">
                    <i class="fas fa-paper-plane"></i>
                    <span>Send File</span>
                </button>
            </div>
        </div>
    </div>

    <div id="chat-container">
        <button id="chat-btn" type="button">
            <i class="fas fa-robot"></i>
            TaskFlow Assistant
        </button>

        <div id="chat-box">
            <div class="chat-header">
                <div class="chat-title">
                    🤖 TaskFlow AI
                </div>

                <button id="close-chat" type="button" aria-label="Close assistant">
                    ✕
                </button>
            </div>

            <div id="messages"></div>

            <div class="chat-input-area">
                <input
                    type="text"
                    id="chat-input"
                    placeholder="Ask about tasks, projects..."
                >

                <button id="send-btn" type="button" aria-label="Send message">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    <div id="inviteModal" class="modal-overlay hidden">
    <div class="modal-card">
        <div class="modal-header">
            <h3>Invite User</h3>
            <button onclick="closeInviteModal()">✕</button>
        </div>

        <div class="modal-body">

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    id="inviteEmail"
                    placeholder="Enter email">
            </div>

            <div class="form-group">
                <label>Role</label>
                <select id="inviteRole">
                    <option value="user">User</option>
                    <option value="manager">Manager</option>
                </select>
            </div>

            <div class="form-actions">
                <button class="btn btn-secondary"
                        onclick="closeInviteModal()">
                    Cancel
                </button>

                <button class="btn btn-success"
                        id="sendInviteButton"
                        type="button">
                    Send Invite
                </button>
            </div>

        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="/static/javascript/chat.js"></script>
    <script src="/static/javascript/api.js?v=20260521-assign-fix"></script>
    <script src="/static/javascript/admin.js?v=20260606-invitation-route-fix"></script>
    <script>
        let role = String(sessionStorage.getItem("role") || "").trim().toLowerCase();

        async function startAdminPage() {
            if (typeof refreshSessionUser === "function" && sessionStorage.getItem("token")) {
                const freshUser = await refreshSessionUser();
                role = String(freshUser?.role || role || "").trim().toLowerCase();
            }

            if (role !== "admin") {
            alert("Access denied");
            window.location.href = "/";
                return;
        }

        const username = sessionStorage.getItem("username");
        if (username) {
            document.getElementById("welcome-user").innerText = username;
        }

        initializeAdminDashboard();
        }

        startAdminPage();
    </script>
    <div id="google_translate_element" class="hidden"></div>

<script>
function googleTranslateElementInit() {
    new google.translate.TranslateElement({
        pageLanguage:'en',
        includedLanguages:'en,hi',
        autoDisplay:false
    },'google_translate_element');
}
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
