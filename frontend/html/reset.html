<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TaskFlow</title>
    <meta name="description" content="Create a new password for your TaskFlow account.">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/public.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-background login-page auth-page">
<div class="public-decor"></div>

<header class="auth-navbar">
    <a class="auth-logo" href="/">
        <span class="auth-logo-mark">T</span>
        <span>TaskFlow</span>
    </a>

    <nav class="auth-nav-links" aria-label="Primary navigation">
        <a href="/about-us">About Us</a>
        <a href="/features">Features</a>
        <a href="/pricing">Pricing</a>
        <a href="/contact">Contact</a>
        <button class="get-started-btn">
            <a href="/register-page" style="color:white; text-decoration:none;">
                Get Started
            </a>
        </button>
    </nav>

</header>

<main class="login-container">
    <section class="login-card" aria-label="Reset password form">
        <div class="login-card-head">
            <span class="login-eyebrow"><i class="fa-solid fa-lock"></i> Secure update</span>
        </div>

        <label for="password">New Password</label>
        <div class="input-group">
            <i class="input-leading-icon fa-solid fa-lock"></i>
            <input id="password" type="password" placeholder="Enter a new password" autocomplete="new-password">
        </div>

        <button class="login-submit-btn" onclick="resetPassword()">
            <span>Update Password</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>

        <p class="register-copy"><a href="/">Return to login</a></p>
    </section>
</main>

<footer class="auth-footer">
    <span>&copy; 2026 TaskFlow. All rights reserved.</span>
    <a href="/privacy-policy">Privacy Policy</a>
    <a href="/terms-of-service">Terms of Service</a>
    <a href="/help-center">Help Center</a>
</footer>

<script src="/static/javascript/public.js"></script>
<script>
const token = window.location.pathname.split("/").pop();

function resetPassword() {
    const password = document.getElementById("password").value;

    fetch(`/reset-password/${token}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ new_password: password })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.detail || data.message);

        if (data.message === "Password updated successfully") {
            window.location.href = "/";
        }
    })
    .catch(err => console.error(err));
}
</script>
</body>
</html>
